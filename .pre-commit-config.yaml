# See https://prek.j178.dev for more information
# Migrated from pre-commit to prek: https://prek.j178.dev/benchmark/
#
# Install prek itself:
#   $ cargo install prek
#     OR
#   $ brew install prek
#
# Update all prek hooks to latest version:
#   $ prek auto-update
#
# Install all default prek hooks locally:
#   $ prek install
#
# Apply a given prek hook to all files:
#   $ prek run --all-files <id>
#
# Apply all prek hooks to all files:
#   $ prek run --all-files

# Vendored files
exclude: "^vendor/"
ci:
  autoupdate_schedule: monthly
  submodules: true
  skip:
    # missing deps: just
    - just-format
repos:
  - repo: meta
    hooks:
      - id: check-hooks-apply
      - id: check-useless-excludes
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c # frozen: v6.0.0
    hooks:
      # keep-sorted start
      - id: check-executables-have-shebangs
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-toml
      - id: check-yaml
      - id: detect-aws-credentials
        args:
          - --allow-missing-credentials
      - id: detect-private-key
      - id: end-of-file-fixer
        exclude: ^logseq/.logseq/preferences\.json$
      - id: file-contents-sorter
        files: ^vim/.vim/spell/en.utf-8.add$
        args:
          - --ignore-case
      - id: pretty-format-json
        args:
          - --autofix
          - --no-sort-keys
        exclude: ^logseq/.logseq/preferences\.json$|^nvim/.config/nvim/lazy-lock\.json$|^vscode/Library/Application\ Support/Code/User/(keybindings|settings)\.json$|^zed/.config/zed/settings.json$
      - id: trailing-whitespace
        exclude: .gitconfig$
        # keep-sorted end
  # keep-sorted start
  - repo: https://github.com/codespell-project/codespell
    rev: 2ccb47ff45ad361a21071a7eedda4c37e6ae8c5a # frozen: v2.4.2
    hooks:
      - id: codespell
        exclude: vim/.vim/autoload/plug.vim
        args:
          - --ignore-words=.codespell-ignore-words.txt
  - repo: https://github.com/gitleaks/gitleaks
    rev: 2ca41cc1372d1e939a6a879f18cdc19fc1cac1ce # frozen: v8.30.0
    hooks:
      - id: gitleaks
  - repo: https://github.com/golangci/misspell
    rev: b565578a5ec9b815331bdae8f588021f7696ec6f # frozen: v0.8.0
    hooks:
      - id: misspell
  - repo: https://github.com/google/keep-sorted
    rev: ac58172d1655aa47a6f806e56ff0f269d6dbe637 # frozen: v0.8.0
    hooks:
      - id: keep-sorted
  - repo: https://github.com/google/yamlfmt
    rev: b5ca1890231d5e1e5181fef75a1be609d1e25029 # frozen: v0.21.0
    hooks:
      - id: yamlfmt
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: e72a3ca1632f0b11a07d171449fe447a7ff6795e # frozen: v0.48.0
    hooks:
      - id: markdownlint
        exclude: ^(plans/|claude/\.claude/skills/)
        args:
          - --config=.markdownlintrc.json
  - repo: https://github.com/jmlrt/check-yamlschema
    rev: 907e5521b7f182966e59b1736ed1e5ba9eb24641 # frozen: v0.0.7
    hooks:
      - id: check-yamlschema
  - repo: https://github.com/rhysd/actionlint/
    rev: 914e7df21a07ef503a81201c76d2b11c789d3fca # frozen: v1.7.12
    hooks:
      - id: actionlint
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: 745eface02aef23e168a8afb6b5737818efbea95 # frozen: v0.11.0.1
    hooks:
      - id: shellcheck
        exclude: \.zsh$
  - repo: https://github.com/thiagowfx/pre-commit-hooks
    rev: 528e165cff8a11bc4f9f49a9b25f3249e09e4237 # frozen: v0.0.22
    hooks:
      - id: just-format
      - id: check-yamlschema-local
  - repo: https://github.com/thoughtworks/talisman
    rev: 12fab7055d7e640d5dae43209bafc48bf5ef1fd7 # frozen: v1.37.0
    hooks:
      - id: talisman-commit
        entry: cmd --githook pre-commit
        exclude: ^nvim/.config/nvim/lazy-lock\.json$
      - id: talisman-push
        entry: cmd --githook pre-push
        exclude: ^nvim/.config/nvim/lazy-lock\.json$
  - repo: https://github.com/woodruffw/zizmor-pre-commit
    rev: 9257c6050c0261b8c57e712f632dc4a8010109a9 # frozen: v1.25.2
    hooks:
      - id: zizmor
  - repo: https://github.com/zimbatm/mdsh.git
    rev: 4b8fb1e7b52a65d6ea875ede3272ac3571f5d015 # frozen: v0.9.2
    hooks:
      - id: mdsh
  - repo: local
    hooks:
      - id: ghostty
        name: Validate Ghostty config
        entry: sh -c 'command -v ghostty >/dev/null 2>&1 && ghostty +validate-config --config-file=ghostty/.config/ghostty/config || echo "ghostty not installed, skipping validation"'
        pass_filenames: false
        language: system
      - id: prek
        name: Validate prek config
        entry: sh -c 'command -v prek >/dev/null 2>&1 && prek validate-config || pre-commit validate-config'
        pass_filenames: false
        language: system
        files: ^.pre-commit-config.yaml$
# keep-sorted end
